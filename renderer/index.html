<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>P2P FarmVille</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="game-container">
    <canvas id="game-canvas"></canvas>

    <!-- HUD Overlay -->
    <div id="hud" style="display: none;">
      <div id="hud-top">
        <div id="coin-display">500 coins</div>
        <div id="xp-display">Level 1 (0/100 XP)</div>
        <div id="energy-bar-wrap">
          <div id="energy-display">Energy: 30/30</div>
          <div id="energy-bar"><div id="energy-bar-fill"></div></div>
        </div>
        <div id="vehicle-status" style="display: none;"></div>
      </div>

      <!-- Toolbar -->
      <div id="toolbar">
        <button class="tool-btn" data-tool="plow" title="Plow (15 coins, 1 energy)">
          <span class="tool-icon">🔨</span><span class="tool-label">Plow</span>
        </button>
        <button class="tool-btn" data-tool="plant" title="Plant seed on plowed soil">
          <span class="tool-icon">🌱</span><span class="tool-label">Plant</span>
        </button>
        <button class="tool-btn" data-tool="water" title="Water crop (2x growth speed)">
          <span class="tool-icon">💧</span><span class="tool-label">Water</span>
        </button>
        <button class="tool-btn" data-tool="harvest" title="Harvest mature crop">
          <span class="tool-icon">🌾</span><span class="tool-label">Harvest</span>
        </button>
        <button class="tool-btn" data-tool="remove" title="Remove crop (no refund)">
          <span class="tool-icon">✖</span><span class="tool-label">Remove</span>
        </button>
        <div class="toolbar-spacer"></div>
        <button id="inventory-btn" class="tool-btn tool-btn-inv" title="Inventory (I)">
          <span class="tool-icon">📦</span><span class="tool-label">Items</span>
        </button>
        <button id="market-open-btn" class="tool-btn tool-btn-market" title="Open Market">
          <span class="tool-icon">🏪</span><span class="tool-label">Market</span>
        </button>
      </div>

      <!-- Seed Selector Strip (visible when plant tool selected) -->
      <div id="seed-strip" style="display: none;"></div>

      <!-- Placement mode indicator -->
      <div id="placement-indicator" style="display: none;">
        <span id="placement-text">Placing: ---</span>
        <span class="placement-hint">Click to place | ESC to cancel</span>
      </div>

      <!-- Level-up notification -->
      <div id="level-up-notification" style="display: none;">
        <div id="level-up-text">Level Up!</div>
        <div id="level-up-detail"></div>
      </div>

      <!-- Action feedback -->
      <div id="action-feedback" style="display: none;"></div>

      <!-- Object info tooltip -->
      <div id="object-tooltip" style="display: none;">
        <div id="tooltip-title"></div>
        <div id="tooltip-info"></div>
      </div>
    </div>

    <!-- Market Panel -->
    <div id="market-panel">
      <div id="market-header">
        <h2>Market</h2>
        <button id="market-close-btn">X</button>
      </div>
      <div id="market-seed-grid"></div>
    </div>

    <!-- Inventory Panel -->
    <div id="inventory-panel" style="display: none;">
      <div id="inventory-header">
        <h2>Inventory</h2>
        <span id="inventory-header-info">0/50 items</span>
        <button id="inventory-close-btn">X</button>
      </div>
      <div id="inventory-grid"></div>
    </div>

    <!-- Crafting Panel -->
    <div id="crafting-panel" style="display: none;">
      <div id="crafting-header">
        <h2 id="crafting-title">Crafting</h2>
        <button id="crafting-close-btn">X</button>
      </div>
      <div id="crafting-recipes"></div>
      <div id="crafting-queue"></div>
    </div>

    <!-- Setup Screen -->
    <div id="setup-screen">
      <h1>P2P FarmVille</h1>
      <p>Start your farm and connect with neighbors</p>
      <input id="farm-name" type="text" placeholder="Enter Farm Name" maxlength="20" autofocus>
      <button id="start-btn">Start Farming</button>
    </div>

    <!-- Chat Panel -->
    <div id="chat-panel" style="display: none;">
      <div id="chat-messages"></div>
      <form id="chat-form">
        <input id="chat-input" type="text" placeholder="Chat..." autocomplete="off">
        <button type="submit">Send</button>
      </form>
    </div>
  </div>

  <!-- Three.js bundled locally (loaded as module for scene.js import) -->
  <script src="js/ipc-bridge.js"></script>
  <script src="js/player.js"></script>
  <script src="app.js" type="module"></script>
</body>
</html>
